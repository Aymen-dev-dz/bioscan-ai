services:
  - type: web
    name: bioscan-ai
    env: docker
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: true # Activé temporairement pour voir l'erreur
      - key: LOG_CHANNEL
        value: stderr
      - key: DB_CONNECTION
        value: sqlite
      - key: DB_FOREIGN_KEYS
        value: "true"
